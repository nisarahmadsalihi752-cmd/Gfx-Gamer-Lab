<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFX Gamer Lab — Mobile Gaming Pro Resources</title>
    <style>
        /* Apka purana style sara yahan rahega */
        .download-btn { display: block; background: #667eea; color: white; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; }
        .btn-desc { font-size: 12px; color: #8b92b0; margin-top: 5px; display: block; text-align: center; }
        .post-card { background: #242b4a; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="postsContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase Config (Same as Admin)
        const firebaseConfig = { /* config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadPosts() {
            const container = document.getElementById('postsContainer');
            const snapshot = await db.collection('posts').orderBy('timestamp', 'desc').get();
            
            container.innerHTML = snapshot.docs.map(doc => {
                const post = doc.data();
                let buttonsHtml = '';

                // Unlimited Buttons Logic
                if (post.links && Array.isArray(post.links)) {
                    buttonsHtml = post.links.map(link => `
                        <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                            ${link.desc ? `<span class="btn-desc">${link.desc}</span>` : ''}
                            <a href="${link.url}" class="download-btn" target="_blank">
                                <i class="fas fa-download"></i> ${link.title}
                            </a>
                        </div>
                    `).join('');
                } else if (post.link) { 
                    // Purani posts ke liye fallback
                    buttonsHtml = `<a href="${post.link}" class="download-btn" target="_blank">Download Now</a>`;
                }

                return `
                    <div class="post-card">
                        <h3>${post.title}</h3>
                        <p style="color:#8b92b0; font-size:12px;">Category: ${post.category}</p>
                        ${buttonsHtml}
                    </div>
                `;
            }).join('');
        }

        window.onload = loadPosts;
    </script>
</body>
</html>
