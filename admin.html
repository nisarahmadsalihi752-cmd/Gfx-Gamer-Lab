<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Naye Buttons ka style */
        .link-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #30363d; }
        .add-btn { background: var(--success); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div class="form-group">
        <label>LOGO / PROFILE IMAGE</label>
        <input type="file" id="logoFile" accept="image/*">
        <div style="margin: 10px 0;">OR</div>
        <input type="text" id="logoExternalUrl" class="form-control" placeholder="Paste direct image link here (https://...)">
    </div>

    <div class="form-group">
        <label>DOWNLOAD LINKS</label>
        <div id="linksContainer">
            <div class="link-item">
                <input type="text" class="form-control link-url" placeholder="Download Link (Required)" required>
                <input type="text" class="form-control link-title" placeholder="Button Title (Optional - e.g. Download Now)">
                <input type="text" class="form-control link-desc" placeholder="Link Description (Optional)">
            </div>
        </div>
        <button type="button" class="add-btn" onclick="addLinkField()">+ Add More Link</button>
    </div>

    <script>
        // --- LOGIC FOR LOGO LINK ---
        // saveSettings function mein change karein:
        async function saveSettings(e) {
            e.preventDefault();
            const extUrl = document.getElementById('logoExternalUrl').value;
            const data = {
                heroDescription: document.getElementById('heroDescription').value,
                announcementText: document.getElementById('announcementText').value,
                socialBackgroundImage: document.getElementById('socialBackgroundImage').value
            };
            
            // Priority to External Link
            if (extUrl.trim() !== "") {
                data.logo = extUrl;
            } else if (currentLogoUrl) {
                data.logo = currentLogoUrl;
            }
            
            await db.collection('settings').doc('site').set(data, { merge: true });
            alert('✅ Settings saved!');
        }

        // --- LOGIC FOR UNLIMITED BUTTONS ---
        function addLinkField() {
            const container = document.getElementById('linksContainer');
            const div = document.createElement('div');
            div.className = 'link-item';
            div.innerHTML = `
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
                <input type="text" class="form-control link-url" placeholder="Download Link (Required)" style="margin-top:10px">
                <input type="text" class="form-control link-title" placeholder="Button Title (Optional)">
                <input type="text" class="form-control link-desc" placeholder="Link Description (Optional)">
            `;
            container.appendChild(div);
        }

        // Add Post function mein links ko array bana kar save karein:
        async function handleAddPost(e) {
            const linkItems = document.querySelectorAll('.link-item');
            const linksArray = [];
            linkItems.forEach(item => {
                const url = item.querySelector('.link-url').value;
                if(url) {
                    linksArray.push({
                        url: url,
                        title: item.querySelector('.link-title').value || 'Download Now',
                        desc: item.querySelector('.link-desc').value || ''
                    });
                }
            });

            const postData = {
                title: document.getElementById('postTitle').value,
                category: document.getElementById('postCategory').value,
                links: linksArray, // Ab ye array save hoga
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            // ... (Firebase add code)
        }
    </script>
</body>
</html>
