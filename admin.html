<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Sirf naye buttons ke liye thodi styling */
        .btn-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .add-more-btn { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; position: absolute; right: 10px; top: 10px; }
    </style>
</head>
<body>
    <div class="form-group">
        <label>LOGO / PROFILE IMAGE</label>
        <input type="file" id="logoFile" accept="image/*">
        <p style="text-align:center; margin:5px 0;">- OR -</p>
        <input type="text" id="logoUrlInput" class="form-control" placeholder="Paste Image URL here">
    </div>

    <div class="form-group">
        <label>DOWNLOAD BUTTONS</label>
        <div id="dynamicButtonsContainer">
            <div class="btn-item">
                <input type="text" class="form-control b-url" placeholder="Download Link (Required)" required>
                <input type="text" class="form-control b-title" placeholder="Button Title (Optional)">
                <input type="text" class="form-control b-desc" placeholder="Button Description (Optional)">
            </div>
        </div>
        <button type="button" class="add-more-btn" onclick="addNewButtonField()">+ Add More Button</button>
    </div>

    <script>
        // Naya field add karne ka function
        function addNewButtonField() {
            const container = document.getElementById('dynamicButtonsContainer');
            const div = document.createElement('div');
            div.className = 'btn-item';
            div.innerHTML = `
                <button type="button" class="remove-btn" onclick="this.parentElement.remove()">X</button>
                <input type="text" class="form-control b-url" placeholder="Download Link (Required)" style="margin-top:15px">
                <input type="text" class="form-control b-title" placeholder="Button Title (Optional)">
                <input type="text" class="form-control b-desc" placeholder="Button Description (Optional)">
            `;
            container.appendChild(div);
        }

        // Save Settings mein Logo Link ki logic
        async function saveSettings(e) {
            const linkUrl = document.getElementById('logoUrlInput').value;
            const data = { /* ... aapki purani fields ... */ };
            if(linkUrl) data.logo = linkUrl;
            // ... rest of the code
        }

        // Add Post mein Multi-Button logic
        async function handleAddPost(e) {
            const btnElements = document.querySelectorAll('.btn-item');
            const buttonsData = [];
            btnElements.forEach(el => {
                const url = el.querySelector('.b-url').value;
                if(url) {
                    buttonsData.push({
                        url: url,
                        title: el.querySelector('.b-title').value || 'Download Now',
                        desc: el.querySelector('.b-desc').value || ''
                    });
                }
            });
            // Ye buttonsData array Firestore mein save hoga
        }
    </script>
</body>
</html>
